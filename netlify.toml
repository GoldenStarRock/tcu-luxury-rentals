[build]
  publish = "."

[[redirects]]
  from = "http://tculuxuryrentals.com/*"
  to = "https://tculuxuryrentals.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tculuxuryrentals.com/*"
  to = "https://www.tculuxuryrentals.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
