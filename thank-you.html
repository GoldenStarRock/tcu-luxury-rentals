<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | TCU Luxury Rentals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --purple: #4D1979; --purple-bg: #f5f0fa; --purple-border: #d4bfed; --text: #0a0a0f; --text-2: #3a3650; --border: #e4e0f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: rgba(255,255,255,0.95); border-bottom: 1px solid var(--border); padding: 0 48px; height: 66px; display: flex; align-items: center; }
    .nav-logo { font-family: 'Nunito Sans', sans-serif; font-size: 18px; font-weight: 900; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--purple); }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .card { background: var(--purple-bg); border: 1.5px solid var(--purple-border); border-radius: 16px; padding: 56px 48px; text-align: center; max-width: 520px; width: 100%; }
    .icon { font-size: 56px; margin-bottom: 24px; display: block; }
    h1 { font-family: 'Nunito Sans', sans-serif; font-size: 36px; font-weight: 900; color: var(--text); margin-bottom: 12px; letter-spacing: -0.02em; }
    p { font-size: 15px; color: var(--text-2); line-height: 1.7; margin-bottom: 32px; }
    a { display: inline-block; background: var(--purple); color: white; padding: 13px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; text-decoration: none; transition: background .2s; font-family: 'Inter', sans-serif; }
    a:hover { background: #6b2aa0; }
    footer { background: #3a1258; padding: 24px 48px; text-align: center; }
    .footer-logo { font-family: 'Nunito Sans', sans-serif; font-size: 16px; font-weight: 900; color: white; }
    .footer-logo span { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <nav><a href="/" class="nav-logo">TCU <span>Luxury</span> Rentals</a></nav>
  <div class="main">
    <div class="card">
      <span class="icon">✅</span>
      <h1>Thank You!</h1>
      <p>Your inquiry has been received. Our leasing partner at 24 Doors Property Management will be in touch with you shortly.</p>
      <a href="/">← Back to Properties</a>
    </div>
  </div>
  <footer><div class="footer-logo">TCU <span>Luxury</span> Rentals</div></footer>
</body>
</html>
